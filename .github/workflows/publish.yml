name: Publish Release artifact

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  publish:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Restore
        run: dotnet restore PPBM/PPBM.csproj
      - name: Publish
        run: dotnet publish PPBM/PPBM.csproj -c Release -r win-x64 -o publish
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ppbm-release
          path: publish
